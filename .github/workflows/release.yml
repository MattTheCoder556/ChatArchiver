name: Build & release (Windows exe + Linux binary)

# Every push to main produces fresh one-folder PyInstaller builds and publishes them on one
# GitHub Release: a Windows .zip and a Linux .tar.gz. The Windows job creates the release;
# the Linux job (needs: build) attaches its tarball to the same release.
# The packaged Windows app's auto-updater (chatarchiver/exe_updater.py) swaps itself in place
# on launch; on Linux that updater is a no-op (update = re-download the .tar.gz).
# Version = 0.1.<run_number>, which increases monotonically so the compare always works.

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow a manual build from the Actions tab too

permissions:
  contents: write           # required to create releases / push tags

concurrency:                # one release build at a time; cancel superseded pushes
  group: release
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute version and stamp it into the build
        shell: pwsh
        run: |
          $v = "0.1.${{ github.run_number }}"
          "__version__ = `"$v`"" | Out-File -Encoding utf8 chatarchiver/_version.py
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Building version $v"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build exe
        shell: pwsh
        run: python -m PyInstaller --noconfirm ChatArchiver.spec

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path dist/ChatArchiver -DestinationPath "ChatArchiver-$env:VERSION.zip" -Force

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$env:VERSION" "ChatArchiver-$env:VERSION.zip" `
            --title "v$env:VERSION" `
            --notes "Automated build of commit ${{ github.sha }}."

  build-linux:
    needs: build                 # the Windows job creates the release; we attach to it
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the runner's system Python (3.12 on ubuntu-24.04) + the Tk binding, so the
      # bundled GUI has _tkinter. A venv inherits _tkinter from this system Python.
      - name: Install Python Tk + venv
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-venv

      - name: Compute version and stamp it into the build
        run: |
          v="0.1.${{ github.run_number }}"
          echo "__version__ = \"$v\"" > chatarchiver/_version.py
          echo "VERSION=$v" >> "$GITHUB_ENV"
          echo "Building version $v"

      - name: Build binary
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt pyinstaller
          .venv/bin/python -m PyInstaller --noconfirm ChatArchiver.spec

      - name: Package
        run: tar -C dist -czf "ChatArchiver-$VERSION-linux-x86_64.tar.gz" ChatArchiver

      - name: Attach Linux binary to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v$VERSION" "ChatArchiver-$VERSION-linux-x86_64.tar.gz" --clobber
